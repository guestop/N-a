<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile | Universal Apps</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 40px;
    }
    .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg-primary); margin-bottom: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .profile-name { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .profile-bio { font-size: 16px; color: var(--text-secondary); max-width: 600px; margin-bottom: 24px; }
    .profile-meta { font-size: 13px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">⚡ Universal Apps</a>
    <div class="nav-right" id="nav-auth"></div>
  </nav>

  <main class="container fade-in">
    <div class="profile-header" id="p-header">
      <div class="loader" style="width:32px; height:32px;"></div>
    </div>

    <h2 class="section-title">Published Portfolio</h2>
    <div class="card-grid" id="profile-apps">
      <!-- JS injected -->
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Auth.init();
      
      const urlParams = new URLSearchParams(window.location.search);
      const userId = urlParams.get('id');
      
      if (!userId) {
        document.getElementById('p-header').innerHTML = '<h1 class="profile-name">User Not Found</h1>';
        return;
      }

      try {
        const res = await fetch(`/api/users?id=${userId}`);
        if (!res.ok) throw new Error();
        const user = await res.json();
        
        document.getElementById('p-header').innerHTML = `
          <img src="${user.avatar || 'https://github.com/ghost.png'}" class="profile-avatar">
          <h1 class="profile-name">${AppRenderer.escapeHTML(user.username)}</h1>
          <p class="profile-bio">${AppRenderer.escapeHTML(user.bio || 'No bio provided.')}</p>
          <div class="profile-meta">Joined ${new Date(user.created_at).toLocaleDateString()}</div>
        `;

        const apps = await API.fetchApps({ publisher: user.id });
        if (apps.length === 0) {
           document.getElementById('profile-apps').innerHTML = '<p style="color: var(--text-secondary); text-align:center; grid-column:1/-1;">No apps published yet.</p>';
        } else {
           AppRenderer.renderGrid('profile-apps', apps);
        }

      } catch (e) {
        document.getElementById('p-header').innerHTML = '<h1 class="profile-name">User Not Found</h1>';
      }
    });
  </script>
</body>
</html>
