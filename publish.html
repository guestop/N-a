<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish App - Universal Apps</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
  <nav>
    <a href="/" class="brand">Universal Apps</a>
    <div class="links"><a href="/browse.html">Browse</a></div>
    <div id="auth-section"></div>
  </nav>

  <main class="container" style="max-width: 600px;">
    <h1>Publish Your App</h1>
    <p class="text-muted" style="margin-bottom: 2rem;">Host your code anywhere (GitHub Pages, Vercel, etc.) and paste the URL here. Zero storage costs.</p>

    <div id="publish-error" class="hidden" style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;"></div>
    
    <form id="publish-form">
      <div class="form-group">
        <label for="title">App Title *</label>
        <input type="text" id="title" required placeholder="My Awesome Game">
      </div>
      
      <div class="form-group">
        <label for="app_url">App URL * (Must be HTTPS)</label>
        <input type="url" id="app_url" required placeholder="https://username.github.io/repo/">
      </div>
      
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="4" placeholder="What does this app do?"></textarea>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="Games">Games</option>
          <option value="AI">AI/ML</option>
          <option value="Tools">Tools</option>
          <option value="Experiments" selected>Experiments</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="thumbnail">Thumbnail Image URL</label>
        <input type="url" id="thumbnail" placeholder="https://example.com/image.png">
      </div>

      <button type="submit" class="btn" style="width: 100%; padding: 0.75rem;">Publish App to Global Edge</button>
    </form>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await Auth.init();
      if (!user) {
        window.location.href = '/?error=login_required';
        return;
      }
      
      document.getElementById('publish-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const errBox = document.getElementById('publish-error');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="loader" style="width:1rem;height:1rem;"></div> Publishing...';
        errBox.classList.add('hidden');
        
        try {
          const appData = {
            title: document.getElementById('title').value,
            app_url: document.getElementById('app_url').value,
            description: document.getElementById('description').value,
            category: document.getElementById('category').value,
            thumbnail: document.getElementById('thumbnail').value,
          };
          
          const res = await API.publishApp(appData);
          window.location.href = `/app.html?id=${res.id}`;
        } catch (err) {
          errBox.textContent = err.message;
          errBox.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Publish App to Global Edge';
        }
      });
    });
  </script>
</body>
</html>
